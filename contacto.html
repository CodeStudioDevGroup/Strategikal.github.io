<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #000);
}

/* NAV */
.nav-link {
  position: relative;
}
.nav-link::after {
  content:"";
  position:absolute;
  width:0;
  height:2px;
  bottom:-4px;
  left:0;
  background:white;
  transition:.3s;
}
.nav-link:hover::after{width:100%}

/* GLOW */
.glow{
  position:absolute;
  width:400px;
  height:400px;
  background:rgba(0,114,255,0.2);
  filter:blur(140px);
  top:-100px;
  left:-100px;
}

/* FORM PREMIUM */
.form-box{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* INPUTS */
.input-group{
  position: relative;
}

.input-group input,
.input-group textarea{
  width:100%;
  padding:16px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  outline:none;
  transition:0.3s;
}

.input-group label{
  position:absolute;
  left:15px;
  top:14px;
  color:#ccc;
  font-size:14px;
  transition:0.3s;
  pointer-events:none;
}

.input-group input:focus,
.input-group textarea:focus{
  border-color:#0072ff;
  background:rgba(255,255,255,0.15);
}

.input-group input:focus + label,
.input-group textarea:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group textarea:not(:placeholder-shown) + label{
  top:-8px;
  font-size:12px;
  color:#00c6ff;
}

/* BOTON */
.btn{
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  padding:16px;
  border-radius:10px;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}
</style>

</head>

<body class="text-white">

<div class="glow"></div>

<!-- NAVBAR -->
<nav id="navbar" class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-lg">

  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <a href="index.html" class="text-2xl font-bold text-white">
      Strategikal
    </a>

    <div class="hidden md:flex gap-8 text-sm font-semibold text-white">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="servicios.html" class="nav-link">Servicios</a>
      <a href="quienes.html" class="nav-link">Quiénes Somos</a>
      <a href="contacto.html" class="nav-link">Contacto</a>
    </div>

    <a href="https://wa.me/573183776206?text=Hola,%20quiero%20asesoría"
       class="hidden md:block bg-white text-black px-5 py-2 rounded-lg font-semibold">
       Contactar
    </a>

  </div>
</nav>

<!-- HERO -->
<section class="pt-32 pb-20 px-6">
  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

    <div>
      <h1 class="text-5xl font-extrabold mb-6">
        Hablemos de tu proyecto
      </h1>

      <p class="text-gray-300 mb-8 text-lg">
        Nuestro equipo está listo para brindarte soluciones estratégicas en consultoría, trámites e infraestructura.
      </p>

      <div class="space-y-3 text-gray-300">
        <p>✔ Respuesta rápida</p>
        <p>✔ Asesoría profesional</p>
        <p>✔ Atención personalizada</p>
      </div>
    </div>

    <div>
      <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d"
           class="rounded-2xl shadow-2xl object-cover w-full h-[400px] hover:scale-105 transition">
    </div>

  </div>
</section>

<!-- FORMULARIO -->
<section class="pb-20 px-6">
  <div class="max-w-3xl mx-auto">

    <div class="form-box">

      <h2 class="text-3xl font-bold text-center mb-8">
        Contáctanos
      </h2>

      <form action="https://formspree.io/f/TU_ID_AQUI" method="POST" class="space-y-6">

        <div class="grid md:grid-cols-2 gap-6">
          
          <div class="input-group">
            <input type="text" name="nombre" required placeholder=" ">
            <label>Nombre</label>
          </div>

          <div class="input-group">
            <input type="email" name="email" required placeholder=" ">
            <label>Email</label>
          </div>

        </div>

        <div class="input-group">
          <textarea name="mensaje" rows="4" placeholder=" "></textarea>
          <label>Mensaje</label>
        </div>

        <button class="btn w-full">
          Enviar mensaje
        </button>

      </form>

    </div>

  </div>
</section>

<!-- REDES -->
<div class="fixed bottom-6 right-6 flex flex-col gap-4 z-50">

  <a href="https://wa.me/573183776206">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" 
         class="w-14 hover:scale-110 transition rounded-full">
  </a>

  <a href="https://www.instagram.com/alstrategik">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" 
         class="w-14 hover:scale-110 transition rounded-full">
  </a>

</div>

</body>
</html>
